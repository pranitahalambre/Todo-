<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
         integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
         integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
         crossorigin="anonymous" referrerpolicy="no-referrer" />
         
         <link rel="stylesheet" href="./assets/css/style.css">
         <title>Todo App</title>
    </head>
    <body>
        <div class="container mt-5">
  <div class="row">
    <h2 style="background-color:rgb(203, 205, 191); color: black; padding: 10px;">
  Todo Task
</h2>



<!--(FORM) -->
    <div class="col-md-6">
      <form id="todoForm" class="mb-3">
        <div class="input-group">
          <input type="text" id="todoItem" class="form-control" placeholder="Add Todo">
          <button class="btn btn-primary" type="submit">Add Todo</button>
        </div>
      </form>
    </div>

    <!-- (TODO LIST) -->
    <div class="col-md-6">
      <ul class="list-group" id="todoList">
        <li class="list-group-item d-flex justify-content-between">
          <strong>JS</strong>
          <div>
            <i class="fa-solid fa-pen-to-square fa-2x text-primary" role="button"></i>
            <i class="fa-solid fa-trash-can fa-2x text-danger" role="button"></i>
          </div>
        </li>
      </ul>
    
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="./assets/js/Todo.js"></script>
    </body>
</html>
